<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tabularize</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">tabularize</h1>
    </header>

    <main class="main">
      <!-- URL list -->
      <section class="section section--grow">
        <div class="section__head">
          <h2 class="section__title" data-i18n="urlSectionTitle">URL 一覧</h2>
          <div class="section__controls">
            <input
              type="search"
              id="url-search"
              class="search-input"
              data-i18n-placeholder="searchPlaceholder"
            />
            <button type="button" id="sort-toggle" class="btn btn--sort"></button>
          </div>
        </div>
        <ul class="list" id="url-list"></ul>
      </section>

      <!-- Domain list -->
      <section class="section section--grow">
        <div class="section__head">
          <h2 class="section__title" data-i18n="domainSectionTitle">ドメイン一覧</h2>
          <div class="section__controls">
            <input
              type="search"
              id="domain-search"
              class="search-input"
              data-i18n-placeholder="searchPlaceholder"
            />
          </div>
        </div>
        <ul class="list" id="domain-list"></ul>
      </section>

      <!-- Actions -->
      <section class="section section--actions">
        <h2 class="section__title" data-i18n="actionsSectionTitle">一括操作</h2>
        <div class="actions">
          <button type="button" id="group-all-btn" class="btn btn--primary" data-i18n="groupAllBtn"></button>
          <button type="button" id="sort-tabs-toggle" class="btn btn--sort-tabs"></button>
          <button type="button" id="reset-btn" class="btn btn--danger" data-i18n="resetBtn"></button>
        </div>
        <p id="error-message" class="error-message" hidden></p>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
