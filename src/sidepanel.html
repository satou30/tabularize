<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tabularize</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">tabularize</h1>
    </header>

    <main class="main">
      <!-- URL 一覧 -->
      <section class="section section--grow">
        <div class="section__head">
          <h2 class="section__title">URL 一覧</h2>
          <div class="section__controls">
            <input
              type="search"
              id="url-search"
              class="search-input"
              placeholder="検索..."
            />
            <button type="button" id="sort-toggle" class="btn btn--sort">訪問数順</button>
          </div>
        </div>
        <ul class="list" id="url-list"></ul>
      </section>

      <!-- ドメイン一覧 -->
      <section class="section section--grow">
        <div class="section__head">
          <h2 class="section__title">ドメイン一覧</h2>
          <div class="section__controls">
            <input
              type="search"
              id="domain-search"
              class="search-input"
              placeholder="検索..."
            />
          </div>
        </div>
        <ul class="list" id="domain-list"></ul>
      </section>

      <!-- 一括操作 -->
      <section class="section section--actions">
        <h2 class="section__title">一括操作</h2>
        <div class="actions">
          <button type="button" id="group-all-btn" class="btn btn--primary">全タブをグループ化</button>
          <button type="button" id="sort-tabs-toggle" class="btn btn--sort-tabs">タブ並び替え: OFF</button>
          <button type="button" id="reset-btn" class="btn btn--danger">データをリセット</button>
        </div>
        <p id="error-message" class="error-message" hidden></p>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
